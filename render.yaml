services:
  - type: web
    name: dit-bid-comparison
    runtime: python
    buildCommand: pip install -r requirements_app.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: pipeline-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
